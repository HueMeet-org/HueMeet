# ─────────────────────────────────────────────────────────────────────────────
# HueMeet – Deploy FastAPI backend to HuggingFace Spaces
# ─────────────────────────────────────────────────────────────────────────────

name: Deploy Backend → HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "backend/**"           # only trigger when backend files change
      - ".github/workflows/deploy-backend.yml"

  # Allow manual re-deploys from the Actions tab
  workflow_dispatch:

jobs:
  # Lint & basic sanity checks
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check src/ app.py

  # Deploy to HuggingFace Spaces
  deploy:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    needs: lint          # Only deploy if lint passes
    environment: production   # Requires manual approval if configured

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so git push works correctly

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.HF_TOKEN }}" ]; then
            echo "HF_TOKEN secret is not set." && exit 1
          fi
          if [ -z "${{ secrets.HF_SPACE_ID }}" ]; then
            echo "HF_SPACE_ID secret is not set." && exit 1
          fi
          if [ -z "${{ secrets.API_SECRET_KEY }}" ]; then
            echo "API_SECRET_KEY secret is not set." && exit 1
          fi
          echo "All required secrets are present."

      - name: Install huggingface_hub CLI
        run: pip install "huggingface_hub[cli]>=0.23"

      - name: Configure git for HF push
        run: |
          git config --global user.email "ci@huemeet"
          git config --global user.name  "HueMeet CI"

      # Push the /backend directory as the root of the HF Space repo.
      # We use huggingface-cli to upload only the backend subtree.
      - name: Upload backend to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
          GITHUB_SHA_VAR: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="./backend",
              path_in_repo=".",
              repo_id=os.environ["HF_SPACE_ID"],
              repo_type="space",
              commit_message=f"ci: deploy from GitHub SHA {os.environ.get('GITHUB_SHA_VAR', 'unknown')}"
          )
          EOF

      # Push environment variables / secrets as HF Space secrets
      # so the running container can read them at runtime.
      - name: Set HF Space secrets (runtime env vars)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'EOF'
          import os, sys
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]

          secrets = {
              "API_SECRET_KEY": "${{ secrets.API_SECRET_KEY }}",
              "ALLOWED_ORIGINS": "${{ secrets.ALLOWED_ORIGINS || '*' }}",
              "HIDE_DOCS":       "${{ vars.HIDE_DOCS || 'false' }}",
          }

          for key, value in secrets.items():
              if value:
                  api.add_space_secret(repo_id=space_id, key=key, value=value)
                  print(f"Set secret: {key}")
              else:
                  print(f"Skipped empty secret: {key}")

          print("All secrets synced.")
          EOF

      - name: Verify Space is running
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          python - <<'EOF'
          import os, time, sys
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          space_id = os.environ["HF_SPACE_ID"]

          print("Waiting for Space to reach 'RUNNING' state …")
          for attempt in range(20):            # wait up to ~5 min
              info = api.get_space_runtime(repo_id=space_id)
              stage = info.stage
              print(f"  [{attempt+1}/20] stage={stage}")
              if stage == "RUNNING":
                  print("Space is RUNNING!")
                  sys.exit(0)
              if stage in ("ERROR", "STOPPED", "BUILD_ERROR"):
                  print(f"Space ended up in stage: {stage}")
                  sys.exit(1)
              time.sleep(15)

          print("Timed out waiting for RUNNING state – check HF dashboard.")
          sys.exit(1)
          EOF

      - name: Smoke-test the health endpoint
        env:
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          # HF Spaces URL format: https://<owner>-<space-name>.hf.space
          SPACE_URL="https://$(echo "$HF_SPACE_ID" | sed 's|/|-|').hf.space"
          echo "Smoke-testing $SPACE_URL/health …"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SPACE_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "/health returned 200"
              exit 0
            fi
            echo "  Attempt $i: got $STATUS – retrying in 10s …"
            sleep 10
          done
          echo "/health never returned 200"
          exit 1
